kind = "web"
previewPath = "/"
title = "Yalla Viral"
version = "1.0.0"
id = "artifacts/yalla-viral"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/yalla-viral run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yalla-viral", "run", "build" ]
publicDir = "dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
